<div style="padding: 20px; font-family: Arial, sans-serif;">
  <h2>Painel de Benefícios (Desafio Integrado)</h2>

  <table border="1" cellpadding="10" style="border-collapse: collapse; margin-bottom: 20px; width: 50%;">
    <thead>
    <tr style="background-color: #f4f4f4;">
      <th>ID</th>
      <th>Nome</th>
      <th>Saldo Atual</th>
    </tr>
    </thead>
    <tbody>
    <tr *ngFor="let b of beneficios">
      <td>{{ b.id }}</td>
      <td>{{ b.nome }}</td>
      <td style="font-weight: bold; color: green;">R$ {{ b.valor }}</td>
    </tr>
    </tbody>
  </table>

  <div style="border: 1px solid #ccc; padding: 20px; border-radius: 8px; width: 300px; background-color: #fafafa;">
    <h3 style="margin-top: 0;">Fazer Transferência</h3>

    <label>ID Conta Origem:</label><br>
    <input type="number" [(ngModel)]="transferencia.fromId" style="margin-bottom: 10px; width: 100%;"><br>

    <label>ID Conta Destino:</label><br>
    <input type="number" [(ngModel)]="transferencia.toId" style="margin-bottom: 10px; width: 100%;"><br>

    <label>Valor a Transferir (R$):</label><br>
    <input type="number" [(ngModel)]="transferencia.amount" style="margin-bottom: 15px; width: 100%;"><br>

    <button (click)="fazerTransferencia()" style="padding: 10px; width: 100%; background-color: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer;">
      Confirmar Transferência
    </button>

    <p *ngIf="mensagem" style="margin-top: 15px; font-weight: bold;">
      {{ mensagem }}
    </p>
  </div>
</div>
